version: 1
name: exp-2026-04-10-opener-source-sitter-runner-courier3-worker3-hard-reserve-vs-worker4-discriminator
description: Focused opener sub-suite for discriminating whether a hard sustained reserve inside forced heavy-haul 2/3/3 can substitute for the known-good worker4 2/3/4 regime.
run:
  tickDuration: 25
gates:
  primaryMetrics:
    - T_RCL3
    - controllerProgressToRCL3Pct
    - spawnWaitingForSufficientEnergyPct
  training:
    minImprovedPrimaryMetrics: 2
  holdout:
    maxRegressionPct: 5
cases:
  - id: train-c-5k
    cohort: train
    scenario: ../scenarios/duel-basic.yaml
    overrides:
      mapGenerator:
        sourceMapId: 446a0e3a
      run:
        maxTicks: 5000
        pollIntervalMs: 250
        maxWallClockMs: 1800000
        maxStalledPolls: 240
  - id: train-d-5k
    cohort: train
    scenario: ../scenarios/duel-basic.yaml
    overrides:
      mapGenerator:
        sourceMapId: 3454fc1f
      run:
        maxTicks: 5000
        pollIntervalMs: 250
        maxWallClockMs: 1800000
        maxStalledPolls: 240
  - id: holdout-b-5k
    cohort: holdout
    scenario: ../scenarios/duel-basic.yaml
    overrides:
      mapGenerator:
        sourceMapId: f857e984
      run:
        maxTicks: 5000
        pollIntervalMs: 250
        maxWallClockMs: 1800000
        maxStalledPolls: 240
