version: 1
name: exp-2026-04-09-rcl2-free-first-extension-value
description: Fixed-map opener benchmark suite with one free completed candidate extension at RCL2.
run:
  tickDuration: 25
gates:
  primaryMetrics:
    - T_RCL3
    - controllerProgressToRCL3Pct
    - spawnWaitingForSufficientEnergyPct
  training:
    minImprovedPrimaryMetrics: 2
  holdout:
    maxRegressionPct: 5
cases:
  - id: train-a-2k
    cohort: train
    scenario: ../scenarios/duel-basic-free-first-extension.yaml
    overrides:
      mapGenerator:
        sourceMapId: 3a278e6d
      run:
        maxTicks: 2000
        pollIntervalMs: 250
        maxWallClockMs: 1800000
        maxStalledPolls: 240
