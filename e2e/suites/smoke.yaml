version: 1
name: smoke
description: Quick smoke suite for manifest-driven opener evaluation.
mode: duel
run:
  tickDuration: 25
gates:
  training:
    minImprovedPrimaryMetrics: 0
  holdout:
    maxRegressionPct: 100
cases:
  - id: smoke-train-a
    cohort: train
    scenario: ../scenarios/duel-basic.yaml
    overrides:
      mapGenerator:
        sourceMapId: 3a278e6d
      run:
        maxTicks: 200
        pollIntervalMs: 250
        maxWallClockMs: 600000
        maxStalledPolls: 240
  - id: smoke-holdout-a
    cohort: holdout
    scenario: ../scenarios/duel-basic.yaml
    overrides:
      mapGenerator:
        sourceMapId: e665861f
      run:
        maxTicks: 200
        pollIntervalMs: 250
        maxWallClockMs: 600000
        maxStalledPolls: 240
