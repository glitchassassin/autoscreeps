version: 1
name: opener
description: Fixed-map opener benchmark suite for milestone 1.
mode: duel
run:
  tickDuration: 25
cases:
  - id: train-a-10k
    cohort: train
    scenario: ../scenarios/duel-basic.yaml
    overrides:
      mapGenerator:
        sourceMapId: 3a278e6d
      run:
        maxTicks: 10000
        pollIntervalMs: 250
        maxWallClockMs: 1800000
        maxStalledPolls: 240
  - id: holdout-a-10k
    cohort: holdout
    scenario: ../scenarios/duel-basic.yaml
    overrides:
      mapGenerator:
        sourceMapId: bf4049e8
      run:
        maxTicks: 10000
        pollIntervalMs: 250
        maxWallClockMs: 1800000
        maxStalledPolls: 240
